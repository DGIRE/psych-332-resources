<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>This Week — PSYCH 332: Neurobehavioral Laboratory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0f1d2d;
      --bg-mid: #163e65;
      --accent: #0779be;
      --accent-light: #60b0e0;
      --text-primary: #e8eef5;
      --text-secondary: #b0c4de;
      --text-muted: #5a7d9e;
      --zoom-color: #7c5cbf;
      --inperson-color: #0ea5a0;
      --assignment-color: #e8a45c;
      --practicum-color: #e05c7a;
      --survey-color: #5a9ad4;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
    }

    .container {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 32px;
      font-size: 0.78rem;
      animation: fadeIn 0.3s ease-out;
    }
    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 500;
    }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb .bc-sep {
      color: rgba(255,255,255,0.15);
      font-size: 0.7rem;
      user-select: none;
    }
    .breadcrumb .bc-current {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 24px;
      padding: 44px 28px 36px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      animation: fadeIn 0.6s ease-out;
    }
    .hero .overline {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 3.5px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .hero h1 {
      font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 8px;
      background: linear-gradient(135deg, #e8eef5 0%, #60b0e0 50%, #0779be 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero .week-range {
      font-size: 0.92rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .hero .week-num {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* Practicum countdown (compact) */
    .countdown-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 14px 20px;
      background: rgba(224,92,122,0.08);
      border: 1px solid rgba(224,92,122,0.2);
      border-radius: 10px;
      animation: fadeIn 0.5s ease-out 0.1s both;
    }
    .countdown-strip .cd-icon { font-size: 1.2rem; }
    .countdown-strip .cd-text {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--practicum-color);
    }
    .countdown-strip .cd-days {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
    }
    .countdown-strip .cd-unit {
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .countdown-strip .cd-due {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .countdown-strip.done {
      background: rgba(14,165,160,0.08);
      border-color: rgba(14,165,160,0.2);
    }
    .countdown-strip.done .cd-text { color: var(--inperson-color); }

    /* Day cards */
    .day-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 16px;
      animation: fadeIn 0.5s ease-out both;
    }
    .day-card.is-today {
      border-color: rgba(7,121,190,0.35);
      background: rgba(7,121,190,0.05);
    }
    .day-card.is-past {
      opacity: 0.45;
    }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .day-name {
      font-size: 1rem;
      font-weight: 700;
    }
    .day-date {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .today-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(7,121,190,0.15);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(7,121,190,0.3);
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, transform 0.15s;
    }
    .event-item:hover {
      background: rgba(255,255,255,0.04);
      transform: translateX(4px);
    }
    .event-item:last-child { margin-bottom: 0; }

    .event-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .event-dot.zoom { background: var(--zoom-color); }
    .event-dot.inperson { background: var(--inperson-color); }
    .event-dot.assignment { background: var(--assignment-color); }
    .event-dot.practicum { background: var(--practicum-color); }
    .event-dot.survey { background: var(--survey-color); }

    .event-info { flex: 1; }
    .event-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .event-meta {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .event-pts {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .event-pts.practicum { background: rgba(224,92,122,0.2); color: var(--practicum-color); }
    .event-pts.assignment { background: rgba(232,164,92,0.2); color: var(--assignment-color); }

    .no-events {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 8px 14px;
    }

    /* Quick Links section */
    .quick-links {
      margin-top: 28px;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease-out 0.3s both;
    }
    .quick-links h2 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-left: 4px;
    }
    .ql-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .ql-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .ql-card:hover {
      background: rgba(7,121,190,0.08);
      border-color: rgba(7,121,190,0.25);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    .ql-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .ql-label {
      font-size: 0.82rem;
      font-weight: 600;
    }
    .ql-sub {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* Off-quarter message */
    .off-quarter {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
    }
    .off-quarter h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .off-quarter p {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    /* Footer */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 20px 0;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { color: var(--accent-light); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.4rem; }
      .day-card { padding: 16px 18px; }
      .ql-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 380px) {
      body { padding: 12px; }
      .hero h1 { font-size: 1.2rem; }
      .hero { padding: 28px 16px 24px; }
      .day-card { padding: 12px 12px; }
      .day-name { font-size: 0.88rem; }
      .event-item { padding: 8px 10px; }
      .event-title { font-size: 0.8rem; }
    }

    /* ── Global Search ── */
    .search-fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,29,45,0.95);
      backdrop-filter: blur(12px);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .search-fab:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.08);
    }
    .search-fab svg { width: 20px; height: 20px; }
    .search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(15,29,45,0.92);
      backdrop-filter: blur(16px);
      padding: 60px 20px 20px;
      animation: fadeIn 0.2s ease-out;
    }
    .search-overlay.active { display: block; }
    .search-box { max-width: 560px; margin: 0 auto; }
    .search-input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results {
      max-width: 560px;
      margin: 16px auto 0;
      max-height: 60vh;
      overflow-y: auto;
    }
    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .search-result:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
    }
    .search-result .sr-type {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .search-result .sr-title { font-size: 0.88rem; font-weight: 500; }
    .search-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s;
    }
    .search-close:hover { color: var(--accent); }
    .search-hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="container">

    <nav class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="bc-sep">&#8250;</span>
      <span class="bc-current">This Week</span>
    </nav>

    <div class="hero">
      <div class="overline">PSYCH 332 &mdash; Spring 2026</div>
      <h1>This Week</h1>
      <div class="week-range" id="weekRange"></div>
      <div class="week-num" id="weekNum"></div>
    </div>

    <!-- Practicum countdown -->
    <div class="countdown-strip" id="countdownStrip">
      <span class="cd-icon">&#9200;</span>
      <span class="cd-text" id="cdText">Loading&hellip;</span>
      <span class="cd-days" id="cdDays">&ndash;</span>
      <span class="cd-unit">days</span>
      <span class="cd-due" id="cdDue"></span>
    </div>

    <div id="weekContent"></div>

    <!-- Quick links — populated by JS based on current module -->
    <div class="quick-links" id="quickLinks"></div>

    <footer>
      PSYCH 332 &mdash; <a href="https://canvas.uw.edu/courses/1884930" target="_blank" rel="noopener">Canvas Course Site</a> &mdash; University of Washington
    </footer>

  </div>

<script>
(function() {
  // ── Course data ──
  // Lectures: TuTh 12:30-2:20, Tuesdays = Zoom, Thursdays = In-Person
  var zoomSessions = [
    { week: 1,  date: '2026-03-31', title: 'Course Introduction & Overview',          module: 1 },
    { week: 2,  date: '2026-04-07', title: 'Brain Atlas & Allen Institute Resources',  module: 1 },
    { week: 3,  date: '2026-04-14', title: 'Transcriptomics Data Analysis',            module: 1 },
    { week: 4,  date: '2026-04-21', title: 'Connectomics & White Matter Tracts',       module: 1 },
    { week: 5,  date: '2026-04-28', title: 'fMRI Meta-Analysis & Neurosynth',          module: 1 },
    { week: 6,  date: '2026-05-05', title: 'Module 2 Introduction & EEG Basics',       module: 2 },
    { week: 7,  date: '2026-05-12', title: 'EEG Signal Processing & Filtering',        module: 2 },
    { week: 8,  date: '2026-05-19', title: 'Event-Related Potentials (ERPs)',           module: 2 },
    { week: 9,  date: '2026-05-26', title: 'Frequency Analysis & Power Spectra',       module: 2 },
    { week: 10, date: '2026-06-02', title: 'Advanced EEG & Course Wrap-Up',            module: 2 },
  ];

  var inPersonSessions = [
    { week: 1,  date: '2026-04-02', title: 'Neuroanatomy Lab Orientation',              module: 1 },
    { week: 2,  date: '2026-04-09', title: 'Brain Explorer Hands-On Session',           module: 1 },
    { week: 3,  date: '2026-04-16', title: 'Gene Expression Mapping Workshop',          module: 1 },
    { week: 4,  date: '2026-04-23', title: 'Structural Connectivity Discussion',        module: 1 },
    { week: 5,  date: '2026-04-30', title: 'Functional Mapping Practicum Review',       module: 1 },
    { week: 6,  date: '2026-05-07', title: 'EEG Recording Demonstration',               module: 2 },
    { week: 7,  date: '2026-05-14', title: 'Live EEG Experiment',                       module: 2 },
    { week: 8,  date: '2026-05-21', title: 'ERP Analysis Workshop',                     module: 2 },
    { week: 9,  date: '2026-05-28', title: 'Brain-Behavior Correlations Lab',           module: 2 },
    { week: 10, date: '2026-06-04', title: 'Final Presentations & Discussion',          module: 2 },
  ];

  var assignments = [
    { date: '2026-04-07', title: 'First Class Poll',          type: 'assignment', pts: 0  },
    { date: '2026-04-10', title: 'Practicum 1 Subsection 0',  type: 'assignment', pts: 10 },
    { date: '2026-04-20', title: 'Module 1 Practicum Due',    type: 'practicum',  pts: 40, href: 'module1-practicum.html' },
    { date: '2026-05-18', title: 'Practicum 2 Subsection 0',  type: 'assignment', pts: 10 },
    { date: '2026-06-08', title: 'Module 2 Practicum Due',    type: 'practicum',  pts: 40 },
    { date: '2026-06-08', title: 'Feedback Survey',           type: 'survey',     pts: 0  },
    { date: '2026-06-08', title: 'AI Questionnaire (EC)',     type: 'survey',     pts: 0  },
  ];

  // Practicum deadlines
  var practicums = [
    { label: 'Module 1 Practicum', date: new Date(2026, 3, 20, 23, 59) },
    { label: 'Module 2 Practicum', date: new Date(2026, 5, 8, 23, 59) },
  ];

  // Quick links per module
  var moduleLinks = {
    1: [
      { icon: '&#129504;', label: 'Brain Explorer', sub: 'Interactive 3D brain atlas', href: 'PSYCH-332-Brain-Explorer_v1-3.html' },
      { icon: '&#128200;', label: 'PCA Explained',  sub: 'Principal Component Analysis', href: 'pca-explained.html' },
      { icon: '&#128208;', label: 'UMAP Explained', sub: 'Dimensionality reduction',    href: 'umap-explained.html' },
      { icon: '&#128202;', label: 'Clustering',     sub: 'Hierarchical clustering',      href: 'hierarchical-clustering-explained.html' },
      { icon: '&#128203;', label: 'Z-Scores',       sub: 'Normalization guide',          href: 'zscore-explained.html' },
      { icon: '&#128221;', label: 'Practicum Prep', sub: 'Module 1 preparation',         href: 'Practicum1-Preparation.html' },
      { icon: '&#128300;', label: 'Practicum Analysis', sub: 'Analysis walkthrough',     href: 'Practicum1-Analysis.html' },
      { icon: '&#128279;', label: 'References',     sub: 'Reading & resources',           href: 'references-and-reading.html' },
    ],
    2: [
      { icon: '&#128279;', label: 'References',     sub: 'Reading & resources',           href: 'references-and-reading.html' },
      { icon: '&#128218;', label: 'General Info',   sub: 'Course resources hub',          href: 'general-information.html' },
      { icon: '&#128196;', label: 'Syllabus',       sub: 'Policies & schedule',           href: 'syllabus.html' },
      { icon: '&#128197;', label: 'Calendar',       sub: 'Full quarter view',             href: 'calendar.html' },
    ],
  };

  // ── Build events map ──
  var events = {};
  function addEv(dateStr, ev) {
    if (!events[dateStr]) events[dateStr] = [];
    events[dateStr].push(ev);
  }

  zoomSessions.forEach(function(s) {
    addEv(s.date, {
      type: 'zoom',
      title: 'Zoom: ' + s.title,
      meta: 'Tue 12:30\u20132:20 PM \u00b7 Remote via Zoom',
      href: 'https://washington.zoom.us/j/93220693190',
      pts: null,
      module: s.module
    });
  });

  inPersonSessions.forEach(function(s) {
    addEv(s.date, {
      type: 'inperson',
      title: 'In-Person: ' + s.title,
      meta: 'Thu 12:30\u20132:20 PM \u00b7 On campus',
      href: null,
      pts: null,
      module: s.module
    });
  });

  assignments.forEach(function(a) {
    addEv(a.date, {
      type: a.type,
      title: a.title,
      meta: a.pts > 0 ? a.pts + ' points \u00b7 Canvas' : 'Canvas',
      href: a.href || 'https://canvas.uw.edu/courses/1884930/assignments',
      pts: a.pts > 0 ? a.pts : null,
      module: null
    });
  });

  // ── Date helpers ──
  var today = new Date();
  today.setHours(0,0,0,0);

  function fmt(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  var todayStr = fmt(today);

  var dayOfWeek = today.getDay();
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

  var dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  var quarterStart = new Date(2026, 2, 30); // March 30
  var quarterEnd = new Date(2026, 5, 8);    // June 8

  var weekStartDiff = Math.floor((monday - quarterStart) / (7 * 24 * 60 * 60 * 1000));
  var weekNumber = weekStartDiff + 1;

  // ── Determine current module ──
  var currentModule = 1;
  if (weekNumber >= 6) currentModule = 2;

  // ── Render header ──
  var friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  document.getElementById('weekRange').textContent =
    monthNames[monday.getMonth()] + ' ' + monday.getDate() + ' \u2013 ' +
    monthNames[friday.getMonth()] + ' ' + friday.getDate() + ', ' + monday.getFullYear();

  if (weekNumber >= 1 && weekNumber <= 10) {
    document.getElementById('weekNum').textContent = 'Week ' + weekNumber + ' of 10 \u00b7 Module ' + currentModule;
  } else if (today < quarterStart) {
    document.getElementById('weekNum').textContent = 'Quarter begins March 30';
  } else {
    document.getElementById('weekNum').textContent = 'Quarter has ended';
  }

  // ── Practicum countdown ──
  var now = new Date();
  var nextPrac = null;
  for (var i = 0; i < practicums.length; i++) {
    if (practicums[i].date > now) { nextPrac = practicums[i]; break; }
  }
  var strip = document.getElementById('countdownStrip');
  var cdText = document.getElementById('cdText');
  var cdDays = document.getElementById('cdDays');
  var cdDue = document.getElementById('cdDue');

  if (nextPrac) {
    var diff = Math.ceil((nextPrac.date - now) / (1000 * 60 * 60 * 24));
    cdText.textContent = nextPrac.label;
    cdDays.textContent = diff;
    cdDue.textContent = 'due ' + nextPrac.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } else {
    strip.classList.add('done');
    cdText.textContent = 'All practicums submitted!';
    cdDays.textContent = '\u2713';
    cdDue.textContent = '';
  }

  // ── Render week content ──
  var content = document.getElementById('weekContent');

  if (today < new Date(2026, 2, 23) || today > new Date(2026, 5, 12)) {
    var div = document.createElement('div');
    div.className = 'off-quarter';
    if (today < quarterStart) {
      div.innerHTML = '<h2>The quarter hasn\u2019t started yet</h2><p>Spring 2026 begins on Monday, March 30. Check back then for your weekly schedule.</p>';
    } else {
      div.innerHTML = '<h2>The quarter has ended</h2><p>Congratulations on completing PSYCH 332! Final grades will be available on Canvas.</p>';
    }
    content.appendChild(div);
  } else {
    // Show Mon-Fri of current week
    for (var i = 0; i < 5; i++) {
      var d = new Date(monday);
      d.setDate(monday.getDate() + i);
      var dateStr = fmt(d);
      var isToday = dateStr === todayStr;
      var isPast = d < today;

      var card = document.createElement('div');
      card.className = 'day-card';
      if (isToday) card.classList.add('is-today');
      if (isPast && !isToday) card.classList.add('is-past');
      card.style.animationDelay = (i * 0.06) + 's';

      var header = document.createElement('div');
      header.className = 'day-header';
      header.innerHTML =
        '<span class="day-name">' + dayNames[i] + '</span>' +
        '<span class="day-date">' + monthNames[d.getMonth()] + ' ' + d.getDate() + '</span>' +
        (isToday ? '<span class="today-badge">Today</span>' : '');
      card.appendChild(header);

      var dayEvents = events[dateStr] || [];
      if (dayEvents.length === 0) {
        var noEv = document.createElement('div');
        noEv.className = 'no-events';
        noEv.textContent = 'No scheduled events';
        card.appendChild(noEv);
      } else {
        dayEvents.forEach(function(ev) {
          var item = document.createElement(ev.href ? 'a' : 'div');
          item.className = 'event-item';
          if (ev.href) {
            item.href = ev.href;
            if (ev.href.startsWith('http')) item.target = '_blank';
          }
          var ptsHTML = '';
          if (ev.pts) {
            ptsHTML = '<span class="event-pts ' + ev.type + '">' + ev.pts + ' pts</span>';
          }
          item.innerHTML =
            '<div class="event-dot ' + ev.type + '"></div>' +
            '<div class="event-info">' +
              '<div class="event-title">' + ev.title + '</div>' +
              '<div class="event-meta">' + ev.meta + '</div>' +
            '</div>' + ptsHTML;
          card.appendChild(item);
        });
      }
      content.appendChild(card);
    }
  }

  // ── Quick Links ──
  var qlContainer = document.getElementById('quickLinks');
  var links = moduleLinks[currentModule] || moduleLinks[1];

  var qlHTML = '<h2>Module ' + currentModule + ' Resources</h2><div class="ql-grid">';
  links.forEach(function(l) {
    qlHTML += '<a class="ql-card" href="' + l.href + '">' +
      '<span class="ql-icon">' + l.icon + '</span>' +
      '<div><div class="ql-label">' + l.label + '</div>' +
      '<div class="ql-sub">' + l.sub + '</div></div></a>';
  });
  qlHTML += '</div>';
  qlContainer.innerHTML = qlHTML;

})();
</script>
